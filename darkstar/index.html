<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Dark Star | Laguna Seca</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="The Dark Star" />
  <meta property="og:description" content="A rhythm-synced arcade game by Laguna Seca, in build. 135 BPM, green-CRT scanner, NASA skies." />
  <meta property="og:url" content="https://lagunaseca70.com/darkstar/" />
  <meta property="og:image" content="https://lagunaseca70.com/darkstar/img/darkstar_flare_b.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Dark Star" />
  <meta name="twitter:description" content="A rhythm-synced arcade game by Laguna Seca, in build. 135 BPM, green-CRT scanner, NASA skies." />
  <meta name="twitter:image" content="https://lagunaseca70.com/darkstar/img/darkstar_flare_b.jpg" />

  <style>
    :root {
      /* Outside the glass: the ship hull + cockpit */
      --hull:      #e5e3dd;
      --hull-hi:   #f3f2ed;
      --hull-lo:   #cbc9c1;
      --grey:      #a5a19c;
      --grey-dk:   #615d59;
      --ink:       #12100e;
      --amber:     #e8912e;
      --red:       #d8352a;
      --teal:      #37a29a;

      /* Inside the glass: the green scanner */
      --crt-base:  #07150a;
      --crt-base2: #0b2011;
      --crt-green: #48d86b;
      --crt-dim:   #235a2c;
      --crt-hot:   #eaffef;
      --crt-red:   #e5482a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }

    body {
      font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      background: #05070c;
      color: var(--ink);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NASA flare world, outside the ship */
    .background {
      position: fixed;
      inset: 0;
      background: url("img/darkstar_flare_b.jpg") center center / cover no-repeat;
      z-index: -2;
    }
    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 32%, rgba(5,7,12,0.15), rgba(5,7,12,0.78) 78%);
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      margin: auto;
      padding: 18px 10px 26px;
      display: flex;
      justify-content: center;
    }

    /* THE HULL */
    .cabinet {
      position: relative;
      width: 100%;
      background:
        linear-gradient(178deg, var(--hull-hi) 0%, var(--hull) 42%, var(--hull-lo) 100%);
      border-radius: 20px 20px 26px 26px;
      padding: 20px 18px 16px;
      box-shadow:
        0 22px 50px rgba(0,0,0,0.72),
        inset 0 1px 0 rgba(255,255,255,0.8),
        inset 0 -3px 8px rgba(97,93,89,0.35);
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    /* panel seam down each side + corner screws */
    .cabinet::before {
      content: "";
      position: absolute;
      inset: 8px 8px 10px 8px;
      border-radius: 14px;
      border: 1px solid rgba(97,93,89,0.28);
      pointer-events: none;
    }
    .screw {
      position: absolute;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, var(--grey) 60%, var(--grey-dk));
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
    }
    .screw.tl { top: 14px; left: 14px; }
    .screw.tr { top: 14px; right: 14px; }
    .screw.bl { bottom: 16px; left: 14px; }
    .screw.br { bottom: 16px; right: 14px; }

    /* Hull stencil header */
    .hull-head {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 2px 6px 8px;
    }
    .logo {
      width: 84%;
      max-width: 350px;
      height: auto;
      display: block;
      transform: perspective(1300px) rotateY(-8deg);
      transform-origin: left center;
      margin: 4px 0 0;
    }
    .hull-caption {
      margin-top: 9px;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--grey-dk);
    }

    /* SCREEN BEZEL (grey panel holding the CRT) */
    .bezel {
      background: linear-gradient(160deg, #33312e, #171614);
      border-radius: 12px;
      padding: 12px;
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    /* THE GREEN SCANNER */
    .scanner {
      position: relative;
      width: 100%;
      aspect-ratio: 10 / 15;
      max-height: calc(100vh - 320px);
      background:
        radial-gradient(circle at 50% 42%, rgba(72,216,107,0.10), rgba(0,0,0,0) 62%),
        linear-gradient(180deg, var(--crt-base2), var(--crt-base));
      border-radius: 8px;
      overflow: hidden;
      color: var(--crt-green);
    }
    /* scanlines + phosphor grid + vignette */
    .scanner::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(72,216,107,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(72,216,107,0.05) 1px, transparent 1px);
      background-size: 26px 26px;
    }
    .scanner::after {
      content: "";
      position: absolute; inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.30) 0px, rgba(0,0,0,0.30) 1px, transparent 2px, transparent 4px),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 52%, rgba(0,0,0,0.6) 100%);
      z-index: 5;
    }

    /* HUD frame drawn on the screen, in green */
    .hud {
      position: absolute;
      inset: 12px 10px 40px;
      border: 1.5px solid var(--crt-dim);
      border-top: none;
      border-radius: 0 0 10px 10px;
      z-index: 3;
    }
    .telemetry {
      position: absolute;
      top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 4;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .telemetry.left { left: 12px; align-items: flex-start; }
    .telemetry.right { right: 12px; align-items: flex-end; }
    .tbox {
      min-width: 34px;
      padding: 4px 7px;
      background: var(--crt-dim);
      color: #05170b;
      border-radius: 2px;
      text-align: center;
      line-height: 1.15;
    }
    .tbox.hot { background: var(--crt-green); }

    /* centre content */
    .screen-mid {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      z-index: 4;
      text-align: center;
    }
    .proto {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.4em;
      text-indent: 0.4em;
      color: var(--crt-hot);
      text-shadow: 0 0 10px rgba(72,216,107,0.7);
    }
    .proto-sub {
      font-size: 9.5px;
      letter-spacing: 0.26em;
      color: var(--crt-green);
      opacity: 0.8;
    }
    .beat { display: flex; flex-direction: column; align-items: center; gap: 9px; }
    .beat-dot {
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--crt-hot);
      box-shadow: 0 0 12px var(--crt-green);
      animation: pulse 0.4444s steps(1,end) infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(1.3); opacity: 1; }
      40%  { transform: scale(0.8); opacity: 0.35; }
      100% { transform: scale(0.8); opacity: 0.35; }
    }
    .beat-label { font-size: 9.5px; letter-spacing: 0.32em; text-indent: 0.32em; color: var(--crt-green); }

    /* red readout strip, film-style */
    .readout {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      z-index: 4;
      background: var(--crt-red);
      color: #200;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.24em;
      text-indent: 0.24em;
      padding: 3px 14px;
      border-radius: 2px;
    }

    /* COCKPIT SWITCHES (buttons) */
    .switches {
      display: flex;
      gap: 12px;
      margin: 14px 4px 6px;
    }
    .switch {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 10px;
      border-radius: 6px;
      background: linear-gradient(180deg, #fbfaf7, var(--hull-lo));
      border: 1px solid var(--grey-dk);
      box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 2px 3px rgba(0,0,0,0.25);
      text-decoration: none;
      color: var(--ink);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: transform 110ms ease, box-shadow 110ms ease;
    }
    .switch:active { transform: translateY(1px); box-shadow: 0 1px 2px rgba(0,0,0,0.3) inset; }
    .led { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 7px currentColor; }
    .led.amber { background: var(--amber); color: var(--amber); }
    .led.teal  { background: var(--teal);  color: var(--teal); }

    .hull-foot {
      text-align: center;
      font-size: 8.5px;
      line-height: 1.7;
      letter-spacing: 0.08em;
      color: var(--grey-dk);
      text-transform: uppercase;
      font-weight: 700;
      padding: 6px 4px 2px;
    }
    .hull-foot a { color: var(--grey-dk); }

    .game-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    .start-hint {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .start-hint.hidden { opacity: 0; }
    .sh-title {
      font-size: 15px;
      letter-spacing: 0.4em;
      text-indent: 0.4em;
      color: var(--crt-hot);
      text-shadow: 0 0 10px rgba(72, 216, 176, 0.7);
    }
    .sh-sub { font-size: 10px; letter-spacing: 0.24em; color: var(--crt-green); }
    .sh-note { font-size: 8.5px; letter-spacing: 0.14em; color: var(--crt-dim); }

    @media (max-width: 480px) {
      .wrap { padding: 10px 6px 18px; }
      .cabinet { padding: 16px 13px 12px; }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <div class="wrap">
    <div class="cabinet">
      <span class="screw tl"></span><span class="screw tr"></span>
      <span class="screw bl"></span><span class="screw br"></span>

      <div class="hull-head">
        <img class="logo" src="img/darkstar_logo.svg" alt="Dark Star" />
        <div class="hull-caption">A mini game by Laguna Seca</div>
      </div>

      <div class="bezel">
        <div class="scanner">
          <div class="hud"></div>

          <div class="telemetry left">
            <div class="tbox hot">MAX</div>
            <div class="tbox">&beta;<br />6.7</div>
            <div class="tbox">&Omega;<br />1.12</div>
          </div>
          <div class="telemetry right">
            <div class="tbox">&Theta;<br /><span id="tHead">0</span></div>
            <div class="tbox">&Delta;<br />8.4</div>
            <div class="tbox hot">&Sigma; 7</div>
          </div>

          <canvas id="game" class="game-canvas"></canvas>
          <div class="start-hint" id="startHint">
            <div class="sh-title">READY</div>
            <div class="sh-sub">ARROWS TO FLY &middot; SPACE TO FIRE</div>
            <div class="sh-note">Keyboard for now &middot; touch controls to come</div>
          </div>

          <div class="readout">NO.5</div>
        </div>
      </div>

      <div class="switches">
        <a class="switch" href="https://lagunaseca.bandcamp.com/track/laguna-sneca" target="_blank" rel="noopener noreferrer">
          <span class="led amber"></span>Bandcamp
        </a>
        <a class="switch" href="https://lagunaseca70.com/" target="_blank" rel="noopener noreferrer">
          <span class="led teal"></span>Laguna Sneca
        </a>
      </div>

      <div class="hull-foot">
        The Dark Star &middot; a rhythm-synced arcade game, in build<br />
        Music and design by Laguna Seca &middot; <a href="mailto:contact@lagunaseca70.com">contact@lagunaseca70.com</a>
      </div>
    </div>
  </div>
  <script>
  (function () {
    const cv = document.getElementById('game');
    const ctx = cv.getContext('2d');
    const hint = document.getElementById('startHint');
    const headEl = document.getElementById('tHead');
    const GREEN = '#48d86b', HOT = '#eaffef', DIM = '#235a2c';
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let W = 0, H = 0;

    function resize() {
      const r = cv.getBoundingClientRect();
      W = r.width; H = r.height;
      cv.width = Math.round(W * DPR);
      cv.height = Math.round(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    const ship = { x: 0, y: 0, a: -Math.PI / 2, vx: 0, vy: 0, r: 11 };
    function reset() { ship.x = W / 2; ship.y = H / 2; ship.a = -Math.PI / 2; ship.vx = 0; ship.vy = 0; }

    const keys = {};
    const bullets = [];
    let started = false, thrusting = false, lastShot = 0;

    const THRUST = 0.16, FRICTION = 0.99, MAXSPD = 4.4, ROT = 0.078,
          BULLET_SPD = 6, FIRE_MS = 170, BULLET_LIFE = 68;

    function start() { if (!started) { started = true; hint.classList.add('hidden'); } }

    function shoot() {
      const now = performance.now();
      if (now - lastShot < FIRE_MS) return;
      lastShot = now;
      bullets.push({
        x: ship.x + Math.cos(ship.a) * ship.r,
        y: ship.y + Math.sin(ship.a) * ship.r,
        vx: Math.cos(ship.a) * BULLET_SPD + ship.vx,
        vy: Math.sin(ship.a) * BULLET_SPD + ship.vy,
        life: BULLET_LIFE
      });
    }

    const CONTROL = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Spacebar'];
    window.addEventListener('keydown', e => {
      if (CONTROL.includes(e.key)) { e.preventDefault(); start(); }
      keys[e.key] = true;
      if (e.key === ' ' || e.key === 'Spacebar') shoot();
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    function wrap(o) {
      if (o.x < 0) o.x += W; else if (o.x > W) o.x -= W;
      if (o.y < 0) o.y += H; else if (o.y > H) o.y -= H;
    }

    function update() {
      if (keys['ArrowLeft']) ship.a -= ROT;
      if (keys['ArrowRight']) ship.a += ROT;
      thrusting = !!keys['ArrowUp'];
      if (thrusting) { ship.vx += Math.cos(ship.a) * THRUST; ship.vy += Math.sin(ship.a) * THRUST; }
      if (keys['ArrowDown']) { ship.vx *= 0.93; ship.vy *= 0.93; }
      ship.vx *= FRICTION; ship.vy *= FRICTION;
      const sp = Math.hypot(ship.vx, ship.vy);
      if (sp > MAXSPD) { ship.vx *= MAXSPD / sp; ship.vy *= MAXSPD / sp; }
      ship.x += ship.vx; ship.y += ship.vy; wrap(ship);
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx; b.y += b.vy; b.life--; wrap(b);
        if (b.life <= 0) bullets.splice(i, 1);
      }
      if (headEl) headEl.textContent = ((Math.round(ship.a * 180 / Math.PI) + 90) % 360 + 360) % 360;
    }

    function drawShip() {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.a);
      ctx.lineWidth = 1.6;
      ctx.lineJoin = 'round';
      ctx.shadowColor = GREEN;
      ctx.shadowBlur = 6;
      ctx.strokeStyle = HOT;
      ctx.beginPath();
      ctx.moveTo(ship.r, 0);
      ctx.lineTo(-ship.r * 0.8, ship.r * 0.72);
      ctx.lineTo(-ship.r * 0.4, 0);
      ctx.lineTo(-ship.r * 0.8, -ship.r * 0.72);
      ctx.closePath();
      ctx.stroke();
      if (thrusting) {
        ctx.strokeStyle = GREEN;
        ctx.beginPath();
        ctx.moveTo(-ship.r * 0.5, ship.r * 0.34);
        ctx.lineTo(-ship.r * (1.0 + Math.random() * 0.7), 0);
        ctx.lineTo(-ship.r * 0.5, -ship.r * 0.34);
        ctx.stroke();
      }
      ctx.restore();
      ctx.shadowBlur = 0;
    }

    function drawBullets() {
      ctx.fillStyle = HOT;
      ctx.shadowColor = GREEN;
      ctx.shadowBlur = 6;
      for (const b of bullets) { ctx.beginPath(); ctx.arc(b.x, b.y, 1.8, 0, 7); ctx.fill(); }
      ctx.shadowBlur = 0;
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      if (started) update();
      drawBullets();
      drawShip();
      requestAnimationFrame(loop);
    }

    function init() { resize(); reset(); loop(); }
    window.addEventListener('resize', () => {
      const ox = W ? ship.x / W : 0.5, oy = H ? ship.y / H : 0.5;
      resize(); ship.x = ox * W; ship.y = oy * H;
    });
    if (document.readyState !== 'loading') init();
    else window.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
</html>
