<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Dark Star | Laguna Seca</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="The Dark Star" />
  <meta property="og:description" content="A rhythm-synced arcade game by Laguna Seca, in build. 135 BPM, CRT vectors, NASA skies." />
  <meta property="og:url" content="https://lagunaseca70.com/darkstar/" />
  <meta property="og:image" content="https://lagunaseca70.com/darkstar/img/darkstar_flare_b.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Dark Star" />
  <meta name="twitter:description" content="A rhythm-synced arcade game by Laguna Seca, in build. 135 BPM, CRT vectors, NASA skies." />
  <meta name="twitter:image" content="https://lagunaseca70.com/darkstar/img/darkstar_flare_b.jpg" />

  <style>
    :root {
      --space-black: #05070c;
      --cabinet-top: #141a2b;
      --cabinet-bottom: #05060a;
      --crt-green: #5cffb0;
      --crt-green-dim: rgba(92, 255, 176, 0.55);
      --crt-cyan: #4fe9ff;
      --hot-pink: #ff3d80;
      --amber: #ffcf6b;
      --text-dim: rgba(200, 255, 230, 0.72);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; width: 100%; }

    body {
      font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--space-black);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NASA flare backdrop, echoing the Laguna Sneca layout */
    .background {
      position: fixed;
      inset: 0;
      background: url("img/darkstar_flare_b.jpg") center center / cover no-repeat;
      z-index: -2;
    }
    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 30%, rgba(5, 7, 12, 0.25), rgba(5, 7, 12, 0.82) 75%);
      z-index: -1;
    }

    .cabinet-wrapper {
      width: 100%;
      max-width: 430px;
      padding: 16px 8px 24px;
      display: flex;
      justify-content: center;
    }

    .cabinet {
      width: 100%;
      background: linear-gradient(180deg, var(--cabinet-top) 0%, var(--cabinet-bottom) 100%);
      border-radius: 28px;
      box-shadow:
        0 20px 46px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(92, 255, 176, 0.14),
        inset 0 0 60px rgba(0, 0, 0, 0.6);
      padding: 26px 20px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Wordmark */
    .logo { text-align: center; margin-bottom: 4px; }
    .logo-kicker {
      display: block;
      font-size: 13px;
      letter-spacing: 0.62em;
      text-indent: 0.62em;
      color: var(--amber);
      margin-bottom: 4px;
    }
    .logo-main {
      display: block;
      font-weight: 700;
      font-size: clamp(38px, 13vw, 54px);
      letter-spacing: 0.06em;
      color: var(--crt-green);
      text-shadow:
        0 0 6px var(--crt-green-dim),
        0 0 18px rgba(92, 255, 176, 0.35),
        0 0 40px rgba(92, 255, 176, 0.18);
    }
    .subtitle {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-align: center;
      color: var(--text-dim);
      margin: 10px 0 18px;
    }

    /* CRT screen */
    .screen-shell {
      width: 100%;
      background: linear-gradient(135deg, #0a1018, #04070c);
      border-radius: 16px;
      padding: 10px;
      box-shadow: inset 0 0 0 1px rgba(92, 255, 176, 0.10);
      margin-bottom: 16px;
    }
    .screen {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      max-height: calc(100vh - 300px);
      background:
        radial-gradient(circle at 50% 42%, rgba(92, 255, 176, 0.05), rgba(0, 0, 0, 0) 60%),
        #01040a;
      border: 2px solid #000;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }
    /* faint vector grid */
    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(92, 255, 176, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(92, 255, 176, 0.06) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 1;
    }
    /* scanlines + vignette */
    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.24) 0px, rgba(0,0,0,0.24) 1px, transparent 2px, transparent 3px),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
      z-index: 3;
    }

    .screen-content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .prototype-title {
      font-size: 15px;
      letter-spacing: 0.42em;
      text-indent: 0.42em;
      color: var(--crt-green);
      text-shadow: 0 0 10px var(--crt-green-dim);
    }
    .prototype-sub {
      font-size: 10px;
      letter-spacing: 0.28em;
      color: var(--text-dim);
    }

    /* 135 BPM beat indicator */
    .beat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .beat-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--hot-pink);
      box-shadow: 0 0 12px var(--hot-pink);
      animation: pulse 0.4444s steps(1, end) infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(1.25); opacity: 1; }
      40%  { transform: scale(0.85); opacity: 0.45; }
      100% { transform: scale(0.85); opacity: 0.45; }
    }
    .beat-label {
      font-size: 10px;
      letter-spacing: 0.34em;
      text-indent: 0.34em;
      color: var(--amber);
    }

    /* Buttons */
    .buttons-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      width: 100%;
      margin-bottom: 12px;
    }
    .btn {
      flex: 1;
      max-width: 170px;
      padding: 11px 12px;
      border-radius: 24px;
      border: 1px solid rgba(92, 255, 176, 0.4);
      background: rgba(92, 255, 176, 0.06);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--crt-green);
      text-decoration: none;
      text-align: center;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      background: rgba(92, 255, 176, 0.14);
      box-shadow: 0 0 16px rgba(92, 255, 176, 0.25);
    }
    .btn:active { transform: translateY(1px); }

    .footer {
      text-align: center;
      font-size: 9px;
      line-height: 1.6;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }
    .footer a { color: var(--crt-cyan); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .cabinet-wrapper { padding: 8px 4px 16px; }
      .cabinet { padding: 22px 14px 12px; border-radius: 24px; }
    }
  </style>
</head>
<body>
  <div class="background"></div>

  <div class="cabinet-wrapper">
    <div class="cabinet">
      <div class="logo">
        <span class="logo-kicker">THE</span>
        <span class="logo-main">DARK STAR</span>
      </div>
      <div class="subtitle">A mini game by Laguna Seca</div>

      <div class="screen-shell">
        <div class="screen">
          <div class="screen-content">
            <div class="prototype-title">PROTOTYPE</div>
            <div class="prototype-sub">CABINET SHELL &middot; BUILD IN PROGRESS</div>
            <div class="beat">
              <div class="beat-dot"></div>
              <div class="beat-label">135 BPM</div>
            </div>
          </div>
        </div>
      </div>

      <div class="buttons-row">
        <a class="btn" href="https://lagunaseca.bandcamp.com" target="_blank" rel="noopener noreferrer">Bandcamp</a>
        <a class="btn" href="https://lagunaseca70.com/" target="_blank" rel="noopener noreferrer">Laguna Sneca</a>
      </div>

      <div class="footer">
        The Dark Star &middot; a rhythm-synced arcade game, in build.<br />
        Music and design by Laguna Seca.
        &nbsp;|&nbsp;
        <a href="mailto:contact@lagunaseca70.com">contact@lagunaseca70.com</a>
      </div>
    </div>
  </div>
</body>
</html>
